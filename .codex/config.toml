# Codex CLI configuration — safe defaults for agentic workflows
# Uses workspace-write with never-approval so developer-assisted sessions run
# without repeated confirmation while sandbox and deny/forbid rules remain
# fully active.
#
# - approval_policy = "never" skips interactive approval prompts.
#   Deny/forbid rules still evaluate first and block forbidden commands.
# - sandbox_mode = "workspace-write" confines writes to the project root
#   (blocks edits to .env outside the workspace, shell rc files, system packages).
# - sandbox_workspace_write.network_access = false blocks outbound
#   network egress. Network enablement is deferred per Epic 9 / E9.T6.

approval_policy = "never"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false
