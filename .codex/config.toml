# Codex CLI configuration — safe defaults for agentic workflows
# Uses workspace-write sandbox with on-request approvals so sandboxed commands
# run freely and approval is requested only when a command asks for more access.
#
# - approval_policy = "on-request" runs sandboxed commands without prompting
#   and asks only when a command requests more access than the sandbox grants.
# - sandbox_mode = "workspace-write" confines writes to the project root
#   (blocks edits to .env outside the workspace, migrations/** outside,
#   shell rc files, system packages).
# - sandbox_workspace_write.network_access = false blocks outbound
#   network egress unless explicitly approved per command.

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false
