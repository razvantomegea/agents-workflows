# Codex CLI configuration — safe defaults for agentic workflows
# Uses workspace-write sandbox with on-request approvals so sandboxed commands
# run freely and approval is requested only when a command asks for more access.
#
# - approval_policy = "on-request" runs sandboxed commands without prompting
#   and asks only when a command requests more access than the sandbox grants.
# - sandbox_mode = "workspace-write" confines writes to the project root
#   (blocks edits to .env outside the workspace, migrations/** outside,
#   shell rc files, system packages).
# - sandbox_workspace_write.network_access = false blocks outbound
#   network egress unless explicitly approved per command.
#
# Host hardening — applies on Windows / macOS / Linux / WSL (PRD §1.9.2):
# 1. Native FS only — no cross-mount work (no /mnt/c, no /Volumes, no UNC).
# 2. Container hosts: bind-mount only the project subtree, never $HOME.
# 3. Sandbox via /sandbox or devcontainer / Docker / Podman / VM.
# 4. Non-elevated user — never sudo / doas / su / runas / "Run as administrator".
# 5. Enterprise: install org EDR (MDE / Falcon / SentinelOne) on the host OS.
# Non-interactive mode enabled (runsIn=vm, acknowledged=2026-04-27T17:59:00.953Z).
# Known risks (PRD §1.9.1):
# 1. Claude sub-agent deny-bypass (Anthropic #25000, #43142)
# 2. Codex Windows sandbox instability (OpenAI #15850)
# 3. PowerShell wrapper prefix_rule bypass (OpenAI #13502)
# 4. Network exfiltration surface (mitigated by E9.T11 + E9.T13)
approval_policy = "never"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true
